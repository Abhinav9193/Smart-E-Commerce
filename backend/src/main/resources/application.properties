spring.application.name=SmartCart

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartcart}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:SmartCartSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyThatIsAtLeast256Bits}
jwt.expiration=86400000

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ORIGIN:http://localhost:3000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
